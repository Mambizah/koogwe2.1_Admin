services:
  - type: web
    name: koogwe-admin
    runtime: static
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://web-production-8d34f.up.railway.app
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
